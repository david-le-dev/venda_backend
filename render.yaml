services:
  - type: web
    name: vedatwin-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    port: 8000
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: GOOGLE_API_KEY
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_VISION_MODEL
        value: gemini-2.5-flash
      - key: ENABLE_RAG
        value: "true"
      - key: ENABLE_FACE_ANALYSIS
        value: "true"
      - key: ENABLE_PALM_ANALYSIS
        value: "true"
      - key: ENABLE_PDF_EXPORT
        value: "true"
      - key: DEFAULT_LANGUAGE
        value: en
